version: "3.8"

services:
  prometheus:
    image: prom/prometheus
    container_name: my_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  node-exporter:
    image: prom/node-exporter
    container_name: my_node_exporter
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana
    container_name: my_grafana
    ports:
      - "3001:3000"