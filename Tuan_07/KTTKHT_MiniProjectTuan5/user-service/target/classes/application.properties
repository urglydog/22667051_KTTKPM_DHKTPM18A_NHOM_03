# ============================================
# Database Configuration
# ============================================
# Local dev (H2) - when no DB env vars set
# Docker prod - set DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userdb}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (local only)
spring.h2.console.enabled=${H2_ENABLED:true}
spring.h2.console.path=/h2-console

# Server
server.port=${SERVER_PORT:8081}

# JWT
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# CORS
cors.allowed-origins=*

# ============================================
# Eureka Client Configuration
# ============================================
spring.application.name=user-service
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
