version: '3.8'

# =============================================================================
# Frontend - React + Nginx
# API Gateway IP: 172.29.176.1
# =============================================================================
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    environment:
      - VITE_BASE_URL=http://172.29.176.1:8080
      - VITE_API_GATEWAY_URL=http://172.29.176.1:8080
    networks:
      - food-network
    restart: unless-stopped

networks:
  food-network:
    name: food-network
    driver: bridge
