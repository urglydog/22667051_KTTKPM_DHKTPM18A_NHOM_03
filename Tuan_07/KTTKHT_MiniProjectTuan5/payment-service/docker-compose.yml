version: '3.8'

# =============================================================================
# Payment Service - Xử lý thanh toán
# Eureka Server IP: 172.29.176.1
# =============================================================================
services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - EUREKA_SERVER_URL=http://172.29.176.1:8761/eureka/
      - HOST_IP=172.29.176.1
      - DB_HOST=postgres-payment
      - DB_PORT=5432
      - DB_NAME=paymentdb
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - ORDER_SERVICE_NAME=ORDER-SERVICE
    depends_on:
      postgres-payment:
        condition: service_healthy
    networks:
      - food-network
    restart: unless-stopped

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-network

volumes:
  postgres-payment-data:

networks:
  food-network:
    name: food-network
    driver: bridge
