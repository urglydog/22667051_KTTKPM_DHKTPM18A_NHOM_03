server:
  port: 8083

spring:
  application:
    name: booking-service
  cloud:
    compatibility-verifier:
      enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

app:
  rabbitmq:
    exchange: booking_exchange
    booking-created-routing-key: booking.created
    payment-completed-routing-key: payment.completed
    booking-failed-routing-key: booking.failed
    booking-result-queue: booking_result_queue

management:
  endpoints:
    web:
      exposure:
        include: health,info
